<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Word Exporter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <h1>Word 导出</h1>
      <p class="intro">把 ChatGPT 或同界面镜像站的回答导出成 `.docx`，并尽量保留公式。</p>
      <button id="exportButton" type="button">导出当前回答</button>
      <p class="hint">如果你先选中部分回答，插件只会导出选中的那一段。</p>
      <p id="status" class="status" aria-live="polite">等待操作</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
